# Copy this file to secrets.toml locally, or add the same keys in Streamlit Cloud secrets.
# Do not commit real production credentials.

admin_user = "admin_nitaai"
admin_password = "change-this-password"

# Optional email alert gateway.
# For online hosted apps, prefer HTTPS email API providers because SMTP ports can be blocked or closed by cloud hosts.
email_provider = "auto" # auto, resend, brevo, sendgrid, or smtp-only by leaving API keys blank
resend_api_key = ""
brevo_api_key = ""
sendgrid_api_key = ""

# SMTP fallback/local delivery.
smtp_host = "smtp.gmail.com"
smtp_port = "587"
smtp_use_tls = "true"
smtp_use_ssl = "false"
smtp_username = "your-alert-sender@gmail.com"
smtp_password = "change-this-smtp-password"
smtp_from = "your-alert-sender@gmail.com"

# One or more concerned official email addresses for automated hourly alerts.
# Keep this in Streamlit secrets, not in public code.
alert_email_recipients = "official1@example.com, official2@example.com"
